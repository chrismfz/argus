server {
    listen 80;
    server_name argus.example.tld;

    # ── Auth ──────────────────────────────────────────────────────────────────
    # Create with: htpasswd -c /etc/nginx/.htpasswd youruser
    auth_basic           "argus NOC";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── / → /dashboard ───────────────────────────────────────────────────────
    location = / {
        return 301 /dashboard;
    }

    # ── SSE streams — buffering MUST be off ──────────────────────────────────
    # These are long-lived chunked responses (live flows, raw fields).
    # With proxy_buffering on nginx would hold the response until the connection
    # closes — the browser would see nothing. proxy_read_timeout is extended so
    # nginx doesn't kill the connection after 60 s of no new flows.
    location ~ ^/tel/(flows|rawflows)/stream {
        auth_basic off;             # already past the outer auth_basic above;
                                    # argus itself trusts 127.0.0.1 unconditionally
        proxy_pass         http://127.0.0.1:9600;
        proxy_http_version 1.1;

        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         3600s; # hold open for up to 1 h
        proxy_send_timeout         3600s;

        # SSE requires Connection: keep-alive with no upgrade
        proxy_set_header Connection '';

        # Standard proxy headers
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Tell nginx not to touch chunked encoding
        chunked_transfer_encoding on;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:9600;
        proxy_http_version 1.1;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        # Standard proxy headers
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Don't forward client's Authorization header to argus —
        # all requests arrive as 127.0.0.1 so argus trusts them unconditionally.
        # Passing the header would be harmless but misleading.
        proxy_set_header Authorization '';
    }

    # ── Harden nginx itself ───────────────────────────────────────────────────
    server_tokens off;                  # don't advertise nginx version
    client_max_body_size 64k;           # matches argus body cap
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          30s;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/argus.access.log;
    error_log  /var/log/nginx/argus.error.log  warn;
}

# After certbot runs it will add a second server {} block for :443 and insert
# ssl_certificate / ssl_certificate_key / return 301 https:// in this block.
# Nothing here needs to change before running: certbot --nginx -d argus.example.tld

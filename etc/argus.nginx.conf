server {
    listen 80;
    server_name argus.myip.gr;

    # ── Auth ──────────────────────────────────────────────────────────────────
    auth_basic           "argus NOC";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Let's Encrypt HTTP-01 challenge ──────────────────────────────────────
    # certbot writes token files here. Must be served from disk, NOT proxied
    # to argus (argus returns 403 for unknown paths — that's intentional, but
    # it would block the challenge). auth_basic off so certbot can reach it.
    location ^~ /.well-known/acme-challenge/ {
        auth_basic   off;
        root         /var/www/html;
        default_type "text/plain";
        try_files    $uri =404;
    }

    # ── / → /dashboard ───────────────────────────────────────────────────────
    location = / {
        return 301 /dashboard;
    }

    # ── SSE streams — buffering MUST be off ──────────────────────────────────
    location ~ ^/tel/(flows|rawflows)/stream {
        auth_basic off;
        proxy_pass            http://127.0.0.1:9600;
        proxy_http_version    1.1;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_set_header      Connection '';
        proxy_set_header      Host            $host;
        proxy_set_header      X-Real-IP       $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        chunked_transfer_encoding on;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    location / {
        proxy_pass            http://127.0.0.1:9600;
        proxy_http_version    1.1;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 5s;
        proxy_set_header      Host            $host;
        proxy_set_header      X-Real-IP       $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      Authorization   '';
    }

    # ── Harden nginx itself ───────────────────────────────────────────────────
    server_tokens        off;
    client_max_body_size 64k;
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          30s;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/argus.access.log;
    error_log  /var/log/nginx/argus.error.log warn;
}

# certbot --nginx -d argus.myip.gr will append the :443 block automatically.

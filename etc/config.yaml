collectors:
  netflow:
    config:
      bindaddr: 0.0.0.0
      bindport: 2055
      debug: false



bgp:
  bgp_listener:
    enabled:    true
    listen_ip:  "116.203.217.190"   # your VM’s IP (used for binding & source of TCP)
    router_id:  "116.203.217.190"   # optional: leave empty to default to listen_ip
    peer_ip:    "84.54.49.1"        # MikroTik’s IP
    asn:        65001               # your 4-byte ASN
    local_asn:  65001
    remote_asn: 216285              # MikroTik’s ASN
    max_peers:  2
    dump_enabled: false   # default off
    store_aspath: false   # set to false for the test; default true in prod

clickhouse:
  host: "localhost"
  user: "default"
  password: ""
  database: "pmacct"
  table: "flows"


geoip:
  asn_db: "/etc/pmacct/GeoLite2-ASN.mmdb"
  city_db: "/etc/pmacct/GeoLite2-City.mmdb"


dns:
  nameserver: "1.1.1.1"
  batch_size: 100
  seconds_interval: 2
  lookback_minutes: 60
  skip_private: true
  max_threads: 2

timezone: "Europe/Athens"

debug: false

enrich: "geoip, bgp, snmp, ptr"
# could be geoip, bgp, ptr, smtp or none #
# surely, none fucks the purpose of doing all this program :-) #
# ptr hammers the system be careful

insert:
  batch_size: 200
  flush_interval_ms: 1000

# my_asn is your real ASN. Useful to enrich your own prefixes, AS_PATH for blackholes prefixes.
my_asn: 216285
my_prefixes:
  - 84.54.49.0/24
  - 194.153.116.0/24
  - 2a14:4280::/29


snmp:
  enabled: true
  target: "84.54.49.1"
  community: "systemworx"
  port: 161
  timeout: 2
  retries: 3

detection:
  enable_detection_engine: true
  rules_config: /opt/flowenricher/etc/detection.yml
  flow_cache_max_window: 60s
  debug_detection: false

  anomaly:
    enabled: true                 # Enable or disable the anomaly detection engine.
    debug: true
    window: 60s                   # Duration of each feature window (e.g. 1 minute of traffic per sample).
    interval: 10s                 # How often to slide the window forward (e.g. every 10s = 6x overlap).
    label: iforest_anomaly        # Tag used when writing anomaly records to logs or DB.
    min_score: 0.50               # Minimum Isolation Forest anomaly score (0–1) to consider suspicious.
    log_only: true                # If true, only log anomalies; if false, take mitigation or alert actions.
    retrain_every: 30m            # How often the model is retrained on new baseline data (e.g. 30m, 1h).
    baseline_max: 200000          # Maximum number of feature samples kept for training (acts as a memory buffer).
    top_k: 10                     # Number of top anomalies per interval to log/report.

  # --- Isolation Forest hyperparameters ---
    trees: 256                    # Number of decision trees in the forest (128–512 typical; more = smoother).
    sample_size: 1024             # Number of samples per tree (512–2048 typical; higher = more accurate, slower).
    contamination: 0.007          # Expected fraction of anomalies in baseline (0.001–0.02). Lower = stricter.

  # --- Optional pre-filter to reduce noise ---
  # Only include flows meeting these conditions in model training/scoring.
    prefilter:
      min_pps: 2                  # Minimum packets per second per source (ignore idle/low-volume hosts).
      min_uniq_dst_ports: 2       # Minimum unique destination ports in window (ignore trivial single-port traffic).
      min_uniq_dst_ips: 2         # Minimum unique destination IPs (ignore one-to-one sessions).
      min_syn_ratio: 0.50         # Minimum TCP SYN ratio (helps focus on connection attempts/scans).
      min_icmp_share: 0.00        # Minimum share of ICMP packets (set >0.3 to focus on ICMP floods, if desired).



  memory:
    enabled: true
    interval: 10s          # should match anomaly.interval
    log_path: /opt/flowenricher/risk.log

    alpha: 0.30            # EWMA smoothing for risk (↑ = shorter memory)
    theta: 0.60            # pivot for “above-normal” debt accumulation
    tau_risk: 0.70         # risk (EWMA) considered high

    debt:
      decay_per_tick: 0.10
      warn_threshold: 1.50

    flags:
      spike_threshold: 0.80   # single-tick spike
      decay_5m: 0.967         # ~exp decay per 10s tick
      decay_30m: 0.994
      consec_high_warn: 3     # 3 spikes in a row

    ttl: 90m
    top_k_enrich: 25          # max IPs/tick to PTR/ASN enrich (extra safety)
    log_state_changes_only: true   # reduces noise











# /ip route add dst-address=192.0.2.1/32 blackhole comment="BGP Blackhole Nexthop"



api:
  listen_address: "127.0.0.1"
  port: 9600
  tokens:
    - "testtoken1"
    - "testtoken2"
  allow_ips:
    - "127.0.0.1"
    - "192.168.0.0/16"

debug_api:
  enabled: true
  listen_address: "127.0.0.1"
  port: 9601
  allow_ips:
    - "127.0.0.1"
  # if false, only IP allow-list is enforced (so pprof CLI works)
  require_token: false


cfm:
  enabled: true
  url: "https://cfm.example.com"
  token: "REDACTED-TOKEN"

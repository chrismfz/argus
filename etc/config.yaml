collectors:
  netflow:
    config:
      bindaddr: 0.0.0.0
      bindport: 2055
      debug: false



bgp:
  bgp_listener:
    enabled:    true
    listen_ip:  "116.203.217.190"   # your VM’s IP (used for binding & source of TCP)
    router_id:  "116.203.217.190"   # optional: leave empty to default to listen_ip
    peer_ip:    "84.54.49.1"        # MikroTik’s IP
    asn:        65001               # your 4-byte ASN
    local_asn:  65001
    remote_asn: 216285              # MikroTik’s ASN
    max_peers:  2
    dump_enabled: false   # default off
    store_aspath: true   # set to false for the test; default true in prod

clickhouse:
  host: "localhost"
  user: "default"
  password: ""
  database: "pmacct"
  table: "flows"


geoip:
  asn_db: "/etc/pmacct/GeoLite2-ASN.mmdb"
  city_db: "/etc/pmacct/GeoLite2-City.mmdb"


dns:
  nameserver: "1.1.1.1"
  batch_size: 100
  seconds_interval: 2
  lookback_minutes: 60
  skip_private: true
  max_threads: 2

timezone: "Europe/Athens"

debug: false

enrich: "geoip, bgp, snmp, ptr"
# could be geoip, bgp, ptr, smtp or none #
# surely, none fucks the purpose of doing all this program :-) #
# ptr hammers the system be careful

insert:
  batch_size: 200
  flush_interval_ms: 1000

# my_asn is your real ASN. Useful to enrich your own prefixes, AS_PATH for blackholes prefixes.
my_asn: 216285
my_prefixes:
  - 84.54.49.0/24
  - 194.153.116.0/24
  - 2a14:4280::/29


snmp:
  enabled: true
  target: "84.54.49.1"
  community: "systemworx"
  port: 161
  timeout: 2
  retries: 3

detection:
  enable_detection_engine: true
  rules_config: /opt/flowenricher/etc/detection.yml
  flow_cache_max_window: 60s
  debug_detection: false

# ──────────────────────────────
  # 🤖 ANOMALY DETECTION (IFOREST + HBOS FUSION)
  # ──────────────────────────────
  #
  # Detects statistically unusual source IPs based on per-minute flow features.
  # Combines Isolation Forest (iforest) with HBOS (histogram-based outlier score).
  # Each source IP’s score is fused and compared against a global running mean.
  #
  # • If `debug_all: true`, logs every scored IP (very verbose).
  # • Otherwise, only logs those with fused_score ≥ mean * (1 + print_above_mean_percent/100).
  #
  # A typical example: mean=0.12 and print_above_mean_percent=25 → logs IPs ≥ 0.15.
  #
  # Logged output goes to `anomalies.log`.  Optionally, the same scores are also
  # sent to the EWMA “memory” tracker below (for long-term risk accumulation).
  anomaly:
    enabled: true                 # Enable or disable anomaly detection engine.
    debug_all: false              # Log every source (true) or only those above the dynamic mean (false).
    window: 60s                   # Duration of feature aggregation window (e.g., 60s per source).
    interval: 10s                 # How often to score flows (e.g., every 10s = 6 overlapping windows per minute).
    label: iforest_anomaly        # Tag written to anomalies.log and risk.log.
    retrain_every: 40m            # How often the Isolation Forest retrains on baseline data.
    baseline_max: 300000          # Max number of feature vectors kept for training (acts as rolling buffer).
    top_k: 10                     # Max top anomalies to log each interval (0 = all).
    # --- Model hyperparameters ---
    trees: 256                    # Number of Isolation Forest trees (128–512 typical).
    sample_size: 1024             # Number of samples per tree (higher = more accuracy, slower).
    contamination: 0.012          # Expected fraction of anomalies in baseline (0.001–0.02 typical).
    # --- HBOS and eHBOS gating & score fusion ---
    require_ehbos_percentile: 0.98     # 0=disable; else gate on eHBOS normalized percentile
    require_hbos_percentile: 0.99 # Skip logging unless HBOS score is below the 99th-percentile threshold (0=disable).

    weights: { iforest: 0.20, ehbos: 0.50, hbos: 0.40 }
    ehbos:
      bins: 12
      eps: 1e-6
      subspaces: 12      # how many random subspaces
      size: 3            # features per subspace
      agg: max           # max|mean

    print_above_mean_percent: 25  # Only log if fused_score ≥ mean * 1.25 (mean updated per tick).

    # --- Optional pre-filter to skip low-activity IPs ---
    # These filters reduce noise and limit training data to active hosts.
    prefilter:
      min_pps: 5                  # Min packets/sec per source (ignore idle sources).
      min_uniq_dst_ports: 2       # Min unique destination ports (ignore single-port sessions).
      min_uniq_dst_ips: 2         # Min unique destination IPs (ignore one-to-one flows).
      min_syn_ratio: 0.50         # Min TCP SYN ratio (focus on scanners/flooders).
      min_icmp_share: 0.00        # Min ICMP fraction (set >0.3 to focus on ICMP floods).

    allow_asns: [13335, 216285, 8075, 15169, 29247, 6799, 3329, 20940, 16625, 54113, 32934, 36459, 2635, 19836, 10515, 5927 ]

  # ──────────────────────────────
  # 🧠 MEMORY (EWMA Risk & Debt Log)
  # ──────────────────────────────
  # Tracks each source IP’s anomaly score over time using EWMA (risk), “debt” buildup,
  # and short-term spike flags.  Writes entries to `risk.log` only when the EWMA risk
  # exceeds `tau_risk` OR certain conditions (bucket↑, consecutive spikes, debt>=warn)
  # are met.  This makes it an early-warning system for hosts slowly trending abnormal.
  #
  # ⚙️ Key tuning knobs:
  #   • alpha — EWMA smoothing (↑ = more reactive / noisier, ↓ = smoother / quieter)
  #   • tau_risk — EWMA threshold for "high risk" logging (↑ quieter, ↓ chattier)
  #   • theta — pivot score for debt accumulation (↑ quieter, ↓ more debt)
  #   • debt.decay_per_tick / warn_threshold — how fast debt drains / when it warns
  #   • flags.spike_threshold — per-tick spike trigger (↑ quieter)
  #   • flags.consec_high_warn — required back-to-back spikes (↑ quieter)
  #   • log_state_changes_only — if true, log only when EWMA bucket rises
  #
  # Typical baselines:
  #   - alpha: 0.3–0.5
  #   - tau_risk: 0.7 (quiet) → 0.5 (medium) → 0.3 (verbose)
  #   - spike_threshold: 0.8–0.9 for low noise
  #   - consec_high_warn: 3–5 for stability
  #
  # The resulting `risk.log` shows IPs with their EWMA risk, debt, and flags
  # along with ASN, PTR, and country enrichment for easier triage.

  memory:
    enabled: true
    interval: 10s          # should match anomaly.interval
    log_path: /opt/flowenricher/risk.log

    alpha: 0.30            # EWMA smoothing for risk (↑ = shorter memory)
    theta: 0.65            # pivot for “above-normal” debt accumulation
    tau_risk: 0.75         # risk (EWMA) considered high

    debt:
      decay_per_tick: 0.10
      warn_threshold: 1.50

    flags:
      spike_threshold: 0.80   # single-tick spike
      decay_5m: 0.967         # ~exp decay per 10s tick
      decay_30m: 0.994
      consec_high_warn: 3     # 3 spikes in a row

    ttl: 90m
    top_k_enrich: 25          # max IPs/tick to PTR/ASN enrich (extra safety)
    log_state_changes_only: true   # reduces noise












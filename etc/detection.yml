#actions: alert and blackhole
#TODO: API


rules:

  # ──────────────── DDoS & Floods ────────────────
  - name: ddos_generic
    same_dst_ip: true
    proto: any
    direction: ingress
    min_flows: 10000
    min_unique_src_ips: 100
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]

  - name: syn_flood
    proto: tcp
    tcp_flags: SYN
    direction: ingress
    same_dst_ip: true
    min_flows: 5000
    min_avg_pps: 1000
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: udp_flood
    proto: udp
    direction: ingress
    same_dst_ip: true
    min_flows: 5000
    min_avg_pps: 2000
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: icmp_flood
    proto: icmp
    direction: ingress
    same_dst_ip: true
    min_flows: 1000
    min_avg_pps: 1000
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  # ──────────────── Brute Force Attacks ────────────────
  - name: ssh_brute
    proto: tcp
    direction: ingress
    dst_port: 22
    same_dst_ip: true
    min_flows: 50
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 40
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: ssh_brute_custom_port1
    proto: tcp
    direction: ingress
    dst_port: 65535
    same_dst_ip: true
    min_flows: 50
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: smtp_brute
    proto: tcp
    direction: ingress
    dst_port: [25, 26, 465, 587]
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert

  - name: imap_brute
    proto: tcp
    direction: ingress
    dst_port: 143
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert

  - name: rdp_brute
    proto: tcp
    direction: ingress
    dst_port: 3389
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  # ──────────────── Port Scanning ────────────────

  - name: vertical_scan
    proto: tcp
    direction: ingress
    same_dst_ip: true
    unique_dst_ports: 30
    min_flows: 80
    dst_port: [20,21,22,23,25,53,67,68,69,80,110,123,135,137,138,139,143,161,162,179,389,443,445,465,514,520,587,636,993,995,1080,1194,1433,1521,1701,1723,2049,2082,2083,2483,3306,3389,3690,4444,4500,5000,5001,5060,5061,5432,5900,5984,6379,6667,8000,8008,8080,8443,8888,9000,9090,9200,9300,11211,27017,27018]
    tcp_flags: SYN
    time_window: 30s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: ["65001:666"]
    blackhole_time: [14400, 28800, 57600, 86400, 0]



  - name: horizontal_scan
    proto: tcp
    direction: ingress
    same_dst_port: true
    unique_dst_ips: 80
    min_flows: 150
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]

# "any" or "udp" in generic_scanner messes up with DNS

  - name: generic_scanner
    proto: tcp
    direction: ingress
    unique_dst_ports: 250
    min_flows: 300
    time_window: 20s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: dns_flood
    proto: udp
    direction: ingress
    dst_port: 53
    same_dst_ip: true
    min_flows: 3000
    min_unique_src_ips: 50
    time_window: 15s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: slow_horizontal_scan
    proto: tcp
    direction: ingress
    same_dst_port: true
    unique_dst_ips: 50
    min_flows: 70
    time_window: 60s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  # ──────────────── Slow SYN Attacks ────────────────
  - name: slow_syn_scan_ssh
    proto: tcp
    direction: ingress
    dst_port: [22, 65535]
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 20
    time_window: 60s
    action: alert,blackhole
    blackhole_count: 40
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: slow_syn_scan_rdp
    proto: tcp
    direction: ingress
    dst_port: 3389
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 8
    time_window: 60s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]



  # ──────────────── WEB / SSL / TLS Enumeration ────────────────
  - name: web_horizontal_scan
    proto: tcp
    direction: ingress
    same_dst_port: true
    dst_port: [80, 443]
    unique_dst_ips: 25
    min_flows: 25
    time_window: 30s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: web_vertical_scan
    proto: tcp
    direction: ingress
    same_dst_ip: true
    dst_port: [80, 443]
    unique_dst_ports: 5
    min_flows: 5
    time_window: 30s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: web_slow_scan
    proto: tcp
    direction: ingress
    dst_port: [80, 443]
    same_dst_port: true
    unique_dst_ips: 10
    min_flows: 10
    time_window: 90s
    action: alert,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]

### v 2025-11-03 onwards ###


# ICMP sweep: one source pinging many of your hosts quickly
  - name: icmp_sweep
    proto: icmp
    same_src_ip: true
    unique_dst_ips: 50
    min_flows: 50
    time_window: 20s
    direction: ingress
    action: alert,blackhole
    blackhole_count: 10
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: ["65001:666"]
    blackhole_time: [14400, 28800, 0]

# UDP horizontal scan across your network on one dst port (e.g., 161 SNMP, 5060 SIP)
  - name: udp_horizontal_scan_common
    proto: udp
    same_dst_port: true
    dst_port: [161, 5060, 69, 123, 1900, 11211, 389, 53]
    unique_dst_ips: 60
    min_flows: 80
    time_window: 30s
    direction: ingress
    action: alert,blackhole
    blackhole_count: 20
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: ["65001:666"]
    blackhole_time: [14400]



# Big egress on uncommon ports to many dsts from one host in short time
  - name: data_exfil_multi_dst
    proto: tcp
    same_src_ip: true
    unique_dst_ips: 50
    min_flows: 80
    min_bytes: 50000000   # 50 MB across flows in window? (see note below)
    time_window: 60s
    direction: egress
    action: alert


# Very slow horizontal web scan over 5 minutes
  - name: web_slow_horizontal_long
    proto: tcp
    same_dst_port: true
    dst_port: [80, 443]
    unique_dst_ips: 60
    min_flows: 60
    time_window: 5m
    direction: ingress
    action: alert,blackhole
    blackhole_count: 20
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: ["65001:666"]
    blackhole_time: [14400, 28800, 0]

# Very slow vertical (ports) on a single host over 10 minutes
  - name: slow_vertical_any
    proto: tcp
    same_dst_ip: true
    unique_dst_ports: 30
    min_flows: 30
    time_window: 10m
    direction: ingress
    action: alert


  - name: syn_only_many_sources
    proto: tcp
    tcp_flags: SYN
    same_dst_ip: true
    min_unique_src_ips: 200
    min_flows: 3000
    min_avg_pps: 1200
    time_window: 15s
    direction: ingress
    action: alert,blackhole
    blackhole_count: 10
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: ["65001:666"]
    blackhole_time: [14400, 28800, 0]

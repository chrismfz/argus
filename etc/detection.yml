#actions: alert and blackhole
#TODO: Clickhouse, API
#

rules:

  # ──────────────── DDoS & Floods ────────────────
  - name: ddos_generic
    proto: any
    same_dst_ip: true
    min_flows: 10000
    min_unique_src_ips: 100
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds

  - name: syn_flood
    proto: tcp
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 5000
    min_avg_pps: 1000
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: udp_flood
    proto: udp
    same_dst_ip: true
    min_flows: 5000
    min_avg_pps: 2000
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: icmp_flood
    proto: icmp
    same_dst_ip: true
    min_flows: 1000
    min_avg_pps: 1000
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  # ──────────────── Brute Force Attacks ────────────────
  - name: ssh_brute
    proto: tcp
    dst_port: 22
    same_dst_ip: true
    min_flows: 50
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 40
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: ssh_brute_custom_port1
    proto: tcp
    dst_port: 65535
    same_dst_ip: true
    min_flows: 50
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: smtp_brute
    proto: tcp
    dst_port: [25, 26, 465, 587]
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert,clickhouse

  - name: imap_brute
    proto: tcp
    dst_port: 143
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert,clickhouse

  - name: rdp_brute
    proto: tcp
    dst_port: 3389
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  # ──────────────── Port Scanning ────────────────
  - name: vertical_scan
    proto: tcp
    same_dst_ip: true
    unique_dst_ports: 90
    min_flows: 150
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: horizontal_scan
    proto: tcp
    same_dst_port: true
    unique_dst_ips: 80
    min_flows: 150
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: generic_scanner
    proto: any
    unique_dst_ports: 200
    min_flows: 300
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: dns_flood
    proto: udp
    dst_port: 53
    same_dst_ip: true
    min_flows: 3000
    min_unique_src_ips: 50
    time_window: 15s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: 14400  # Seconds


  - name: slow_horizontal_scan
    proto: tcp
    same_dst_port: true
    unique_dst_ips: 50
    min_flows: 70
    time_window: 60s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400]


  # ──────────────── Slow SYN Attacks ────────────────
  - name: slow_syn_scan_ssh
    proto: tcp
    dst_port: [22, 65535]
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 20
    time_window: 60s
    action: alert,clickhouse,blackhole
    blackhole_count: 40
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400]


  - name: slow_syn_scan_rdp
    proto: tcp
    dst_port: 3389
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 8
    time_window: 60s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400]



  # ──────────────── WEB / SSL / TLS Enumeration ────────────────
  - name: web_horizontal_scan
    proto: tcp
    same_dst_port: true
    dst_port: [80, 443]
    unique_dst_ips: 25
    min_flows: 25
    time_window: 30s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400]


  - name: web_vertical_scan
    proto: tcp
    same_dst_ip: true
    dst_port: [80, 443]
    unique_dst_ports: 5
    min_flows: 5
    time_window: 30s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400]


  - name: web_slow_scan
    proto: tcp
    dst_port: [80, 443]
    same_dst_port: true
    unique_dst_ips: 10
    min_flows: 10
    time_window: 90s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400]


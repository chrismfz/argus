#actions: alert and blackhole
#TODO: Clickhouse, API
#

rules:

  # ──────────────── DDoS & Floods ────────────────
  - name: ddos_generic
    proto: any
    same_dst_ip: true
    min_flows: 10000
    min_unique_src_ips: 100
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]

  - name: syn_flood
    proto: tcp
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 5000
    min_avg_pps: 1000
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: udp_flood
    proto: udp
    same_dst_ip: true
    min_flows: 5000
    min_avg_pps: 2000
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: icmp_flood
    proto: icmp
    same_dst_ip: true
    min_flows: 1000
    min_avg_pps: 1000
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  # ──────────────── Brute Force Attacks ────────────────
  - name: ssh_brute
    proto: tcp
    dst_port: 22
    same_dst_ip: true
    min_flows: 50
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 40
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: ssh_brute_custom_port1
    proto: tcp
    dst_port: 65535
    same_dst_ip: true
    min_flows: 50
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: smtp_brute
    proto: tcp
    dst_port: [25, 26, 465, 587]
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert,clickhouse

  - name: imap_brute
    proto: tcp
    dst_port: 143
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert,clickhouse

  - name: rdp_brute
    proto: tcp
    dst_port: 3389
    same_dst_ip: true
    min_flows: 40
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  # ──────────────── Port Scanning ────────────────

  - name: vertical_scan
    proto: tcp
    same_dst_ip: true
    unique_dst_ports: 30
    min_flows: 80
    dst_port: [20,21,22,23,25,53,67,68,69,80,110,123,135,137,138,139,143,161,162,179,389,443,445,465,514,520,587,636,993,995,1080,1194,1433,1521,1701,1723,2049,2082,2083,2483,3306,3389,3690,4444,4500,5000,5001,5060,5061,5432,5900,5984,6379,6667,8000,8008,8080,8443,8888,9000,9090,9200,9300,11211,27017,27018]
    tcp_flags: SYN
    time_window: 30s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: ["65001:666"]
    blackhole_time: [14400, 28800, 57600, 86400, 0]



  - name: horizontal_scan
    proto: tcp
    same_dst_port: true
    unique_dst_ips: 80
    min_flows: 150
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: generic_scanner
    proto: any
    unique_dst_ports: 200
    min_flows: 300
    time_window: 20s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: dns_flood
    proto: udp
    dst_port: 53
    same_dst_ip: true
    min_flows: 3000
    min_unique_src_ips: 50
    time_window: 15s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: slow_horizontal_scan
    proto: tcp
    same_dst_port: true
    unique_dst_ips: 50
    min_flows: 70
    time_window: 60s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  # ──────────────── Slow SYN Attacks ────────────────
  - name: slow_syn_scan_ssh
    proto: tcp
    dst_port: [22, 65535]
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 20
    time_window: 60s
    action: alert,clickhouse,blackhole
    blackhole_count: 40
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: slow_syn_scan_rdp
    proto: tcp
    dst_port: 3389
    tcp_flags: SYN
    same_dst_ip: true
    min_flows: 8
    time_window: 60s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]



  # ──────────────── WEB / SSL / TLS Enumeration ────────────────
  - name: web_horizontal_scan
    proto: tcp
    same_dst_port: true
    dst_port: [80, 443]
    unique_dst_ips: 25
    min_flows: 25
    time_window: 30s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: web_vertical_scan
    proto: tcp
    same_dst_ip: true
    dst_port: [80, 443]
    unique_dst_ports: 5
    min_flows: 5
    time_window: 30s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


  - name: web_slow_scan
    proto: tcp
    dst_port: [80, 443]
    same_dst_port: true
    unique_dst_ips: 10
    min_flows: 10
    time_window: 90s
    action: alert,clickhouse,blackhole
    blackhole_count: 30
    blackhole_next_hop: 192.0.2.1
    blackhole_communities: [ "65001:666" ]
    blackhole_time: [14400, 28800, 57600, 86400, 0]


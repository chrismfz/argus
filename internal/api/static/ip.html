<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>argus · IP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.3/cdn.min.js" defer></script>
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:#2a3147;--text:#cdd6f4;--muted:#6c7086;--accent:#89b4fa;--red:#f38ba8;--green:#a6e3a1;--yellow:#f9e2af}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;min-height:100vh}
nav{display:flex;gap:2px;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center}
nav a{padding:10px 16px;color:var(--muted);font-size:13px;text-decoration:none;border-bottom:2px solid transparent}
nav a:hover{color:var(--text)}
nav a.active{color:var(--accent);border-color:var(--accent)}
.content{max-width:980px;margin:0 auto;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px}
.title{font-size:18px;font-weight:700;margin-bottom:4px}
.muted{color:var(--muted)}
.grid{display:grid;grid-template-columns:160px 1fr;gap:8px 12px;margin-top:14px}
.mono{font-family:ui-monospace,Menlo,monospace}
.badge{display:inline-block;background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:999px;font-size:11px;color:var(--muted)}
.err{color:var(--red)}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:999px;font-size:11px}
.chip.active{color:var(--green);border-color:rgba(166,227,161,.4);background:rgba(166,227,161,.08)}
.chip.expired{color:var(--yellow);border-color:rgba(249,226,175,.4);background:rgba(249,226,175,.08)}
.section{margin-top:18px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.section-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
th{text-align:left;font-size:11px;color:var(--muted);font-weight:600}
td{font-size:12px}
.empty-row td{color:var(--muted);font-style:italic}
a.ext{color:var(--accent);text-decoration:none;margin-right:10px}
a.ext:hover{text-decoration:underline}
</style>
</head>
<body x-data="ipPage()" x-init="init()">
<nav>
  <a href="/dashboard">Overview</a>
  <a href="/bgp">BGP</a>
  <a href="/routewatch">Routewatch</a>
  <a href="/detection">Detection</a>
  <a href="/alerts">Alerts</a>
  <a href="/pathfinder">Pathfinder</a>
  <a class="active" href="#">IP</a>
</nav>

<div class="content">
  <div class="card">
    <div class="title mono" x-text="ip || 'Invalid IP'"></div>
    <div class="muted" x-show="loading">Loading IP data…</div>
    <div class="err" x-show="error" x-text="error"></div>

    <template x-if="result && !error">
      <div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          <span class="badge" x-text="result.country || '—'"></span>
          <span class="badge" x-text="result.prefix || '—'"></span>
          <a class="badge" :href="result.asn ? '/asn/' + result.asn : '#'" style="color:var(--accent);text-decoration:none" x-text="result.asn ? ('AS' + result.asn) : 'AS—'"></a>
          <span class="badge" x-text="result.asn_name || '—'"></span>
        </div>

        <div class="section">
          <div class="section-title">Geo / ASN</div>
          <div class="grid">
          <div class="muted">PTR</div><div class="mono" x-text="result.ptr || '—'"></div>
          <div class="muted">ASN</div><div class="mono" x-text="result.asn ? ('AS' + result.asn) : '—'"></div>
          <div class="muted">ASN Name</div><div class="mono" x-text="result.asn_name || '—'"></div>
          <div class="muted">Country</div><div class="mono" x-text="result.country || '—'"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">BGP Visibility</div>
          <div class="grid">
          <div class="muted">Best prefix</div><div class="mono" x-text="result.routing?.prefix || result.prefix || '—'"></div>
          <div class="muted">Best AS path</div><div class="mono" x-text="fmtASPath(result.routing?.best_as_path || result.as_path || [])"></div>
          <div class="muted">Communities</div><div class="mono" x-text="(result.communities || []).join(', ') || '—'"></div>
          <div class="muted">Best next-hop</div><div class="mono" x-text="result.routing?.pathfinder?.best?.next_hop || '—'"></div>
          <div class="muted">Best upstream</div><div class="mono" x-text="result.routing?.pathfinder?.best?.upstream || '—'"></div>
          <div class="muted">Best hops</div><div class="mono" x-text="result.routing?.pathfinder?.best?.hops ?? '—'"></div>
          <div class="muted">Blackhole</div>
          <div>
            <span class="chip" :class="result.blackhole?.active ? 'active' : 'expired'">
              <span x-text="result.blackhole?.active ? 'active' : 'inactive'"></span>
            </span>
          </div>
        </div>
        </div>

        <div class="section">
          <div class="section-title">Pathfinder route context</div>
          <table>
            <thead>
              <tr>
                <th>State</th>
                <th>Upstream</th>
                <th>Next-hop</th>
                <th>Interface</th>
                <th>Hops</th>
                <th>Session</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="!(result.routing?.pathfinder?.routes || []).length">
                <tr class="empty-row"><td colspan="6">no router path context available</td></tr>
              </template>
              <template x-for="(p, i) in (result.routing?.pathfinder?.routes || [])" :key="i">
                <tr>
                  <td><span class="chip" :class="p.active ? 'active' : ''" x-text="p.contribution || (p.active ? 'active' : 'candidate')"></span></td>
                  <td class="mono" x-text="p.upstream || '—'"></td>
                  <td class="mono" x-text="p.gateway || '—'"></td>
                  <td class="mono" x-text="p.interface || '—'"></td>
                  <td class="mono" x-text="p.hops ?? '—'"></td>
                  <td class="mono" x-text="p.session_name || '—'"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="section-sub" x-text="tracerouteSummary()"></div>
        </div>

        <div class="section">
          <div class="section-title">Latest blackhole event</div>
          <table>
            <thead>
              <tr>
                <th>When</th>
                <th>Prefix</th>
                <th>Status</th>
                <th>Detector</th>
                <th>Risk reason</th>
                <th>Expires</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="!result.blackhole?.latest_event">
                <tr class="empty-row">
                  <td colspan="6">never blackholed</td>
                </tr>
              </template>
              <template x-if="result.blackhole?.latest_event">
                <tr>
                  <td class="mono" x-text="fmtTs(result.blackhole.latest_event.timestamp)"></td>
                  <td class="mono" x-text="result.blackhole.latest_event.prefix || '—'"></td>
                  <td>
                    <span class="chip" :class="result.blackhole?.active ? 'active' : 'expired'" x-text="result.blackhole?.active ? 'active' : 'expired'"></span>
                  </td>
                  <td>
                    <span class="chip" x-text="result.blackhole.latest_event.rule || '—'"></span>
                  </td>
                  <td>
                    <span class="chip" x-text="result.blackhole.latest_event.reason || '—'"></span>
                  </td>
                  <td class="mono" x-text="fmtTs(result.blackhole.latest_event.expires_at)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <div class="section">
          <div class="section-title">Detections</div>
          <table>
            <thead>
              <tr>
                <th>Detector</th>
                <th>Risk reason</th>
                <th>Count</th>
                <th>First seen</th>
                <th>Last seen</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="!(result.detections || []).length">
                <tr class="empty-row">
                  <td colspan="5">no detections</td>
                </tr>
              </template>
              <template x-for="(d, i) in (result.detections || [])" :key="i">
                <tr>
                  <td><span class="chip" x-text="d.detector || '—'"></span></td>
                  <td><span class="chip" x-text="d.risk || '—'"></span></td>
                  <td class="mono" x-text="d.count ?? 0"></td>
                  <td class="mono" x-text="fmtTs(d.first_seen)"></td>
                  <td class="mono" x-text="fmtTs(d.last_seen)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <div class="section">
          <div class="section-title">External links</div>
          <template x-if="!(result.external_links || []).length">
            <div class="muted">no ASN links available</div>
          </template>
          <template x-for="(l, i) in (result.external_links || [])" :key="i">
            <a class="ext mono" :href="l.url" target="_blank" rel="noopener noreferrer" x-text="l.label"></a>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
function ipPage(){ return {
  ip: '',
  loading: false,
  error: '',
  result: null,

  init() {
    const parts = window.location.pathname.split('/').filter(Boolean)
    const ipIdx = parts.indexOf('ip')
    this.ip = ipIdx >= 0 && parts.length > ipIdx + 1 ? decodeURIComponent(parts[ipIdx + 1]) : ''
    document.title = this.ip ? `argus · IP ${this.ip}` : 'argus · IP'
    this.load()
  },

  async load() {
    if (!this.ip) { this.error = 'Invalid IP'; return }
    this.loading = true
    this.error = ''
    this.result = null
    try {
      const r = await fetch('/ip/' + encodeURIComponent(this.ip) + '/profile')
      if (!r.ok) throw new Error('Lookup failed')
      this.result = await r.json()
    } catch (e) {
      this.error = e?.message || 'Lookup failed'
    } finally {
      this.loading = false
    }
  },

  fmtTs(ts) {
    if (!ts) return '—'
    const d = new Date(ts)
    return Number.isNaN(d.getTime()) ? ts : d.toLocaleString()
  },

  fmtASPath(path) {
    if (!path || !path.length) return '—'
    return path.map(h => 'AS' + h.asn).join(' → ')
  },

  tracerouteSummary() {
    const t = this.result?.routing?.traceroute
    if (!t?.available) return 'Traceroute summary unavailable (RouterOS not connected).'
    if (t?.requested && t?.error) return 'Traceroute failed: ' + t.error
    if (t?.hop_count > 0) {
      return `Traceroute: ${t.hop_count} hops via ${t.upstream || 'unknown upstream'} (${t.source_ip || 'auto source'}).`
    }
    return 'Traceroute not requested. Add ?traceroute=1 to the profile endpoint for live probe.'
  },
}}
</script>
</body>
</html>
